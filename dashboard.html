<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolDuty - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4e73df">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SchoolDuty">
    <link rel="apple-touch-icon" href="img/logo.png">
</head>
<body>

<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <img src="img/logo.png" alt="SchoolDuty" class="logo-img-sidebar">
            <span>SchoolDuty</span>
        </div>
        <nav>
            <ul id="menu"></ul>
        </nav>
        <button class="logout" onclick="cerrarSesion()">
            <i class="bx bx-log-out" aria-hidden="true"></i>
            <span>Cerrar sesión</span>
        </button>
    </aside>

    <!-- CONTENIDO -->
    <main class="main">
        <header class="topbar">
            <h2 id="bienvenida">Bienvenido</h2>
        </header>
        <div class="content" id="content-area">
            <!-- Se carga dinámicamente -->
        </div>
    </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Modal global -->
<div id="modal-global" class="modal" style="display:none;">
    <span class="cerrar-modal" onclick="cerrarModalGlobal()">&times;</span>
    <img id="img-global" alt="">
</div>

<!-- Firebase SDK -->
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/data.js"></script>
<script type="module" src="js/notas.js"></script>
<script type="module" src="js/comportamiento.js"></script>
<script type="module" src="js/anuncios.js"></script>
<script type="module" src="js/cuenta.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/inasistencia.js"></script>

<!-- PWA Service Worker -->
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js');
    }
</script>

</body>
</html>
